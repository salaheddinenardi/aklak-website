<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكلاك | aklake</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; }
        
        nav { background: #fff; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 1.5em; font-weight: 700; color: #14539a; }
        .nav-links a { text-decoration: none; color: #333; margin: 0 15px; font-weight: bold; }

        .search-section { text-align: center; padding: 80px 20px; }
        .input-wrapper { position: relative; max-width: 600px; margin: 20px auto; }
        .search-box { width: 100%; padding: 20px; border: 1px solid #ddd; border-radius: 50px; font-size: 1em; }
        
        #send-btn { position: absolute; left: 15px; top: 15px; background: #14539a; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: none; }
        
        .quick-actions { margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .action-btn { padding: 10px 20px; border: 1px solid #14539a; background: white; color: #14539a; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .action-btn:hover { background: #14539a; color: white; }
    </style>
</head>
<body>

<nav>
    <div class="logo">aklake</div>
    <div class="nav-links">
        <a href="#">المنتجات</a>
        <a href="#"><i class="fas fa-user-circle"></i> تسجيل الدخول</a>
    </div>
</nav>

<section class="search-section">
    <h2>كيف يمكنني المساعدة؟</h2>
    <div class="input-wrapper">
        <input type="text" id="search-input" class="search-box" placeholder="بماذا تفكر اليوم؟..." oninput="checkInput()">
        <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
    <div class="quick-actions">
        <button class="action-btn" onclick="fillInput('أنشئ لي كتاباً مكوناً من 600 صفحة')">أنشئ لي كتاباً (600 صفحة)</button>
        <button class="action-btn" onclick="fillInput('أنشئ لي سيرة ذاتية وأبحث عن عمل')">سيرة ذاتية وبحث عن عمل</button>
        <button class="action-btn" onclick="fillInput('أنشئ لي لوحة فنية لأعلقها على الحائط')">أنشئ لي لوحة فنية</button>
    </div>
</section>

<script>
    const input = document.getElementById('search-input');
    const btn = document.getElementById('send-btn');

    function fillInput(text) {
        input.value = text;
        checkInput();
    }

    function checkInput() {
        btn.style.display = input.value.length > 0 ? 'block' : 'none';
    }
</script>

</body>
</html>

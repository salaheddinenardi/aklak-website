<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكلاك | aklake</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; }
        
        nav { background: #fff; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 1.5em; font-weight: 700; color: #14539a; }
        .nav-links { display: flex; align-items: center; gap: 15px; }
        .nav-links a, .nav-links button { text-decoration: none; color: #333; margin: 0; font-weight: bold; background: none; border: none; cursor: pointer; font-family: inherit; font-size: 1em; }

        /* تصميم معلومات المستخدم والنقاط */
        #user-info { display: none; align-items: center; gap: 15px; background: #eef2f7; padding: 8px 20px; border-radius: 20px; }
        .credits { color: #28a745; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .logout-btn { color: #dc3545 !important; font-size: 0.9em; }

        .search-section { text-align: center; padding: 80px 20px; }
        .input-wrapper { position: relative; max-width: 600px; margin: 20px auto; display: flex; align-items: center; background: white; border: 1px solid #ddd; border-radius: 50px; padding: 5px 15px; }
        .search-box { flex: 1; padding: 15px; border: none; outline: none; border-radius: 50px; font-size: 1em; background: transparent; }
        
        #send-btn { background: #14539a; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: none; justify-content: center; align-items: center; transition: 0.3s; }
        #send-btn:hover { background: #0d3b6e; }
        
        .quick-actions { margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .action-btn { padding: 10px 20px; border: 1px solid #14539a; background: white; color: #14539a; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .action-btn:hover { background: #14539a; color: white; }

        /* نافذة تسجيل الدخول المنبثقة */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .modal h3 { margin-top: 0; color: #14539a; }
        .modal input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .modal button.primary-btn { width: 90%; padding: 12px; background: #14539a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .modal button.close-btn { background: none; border: none; color: #999; cursor: pointer; margin-top: 15px; text-decoration: underline; }

        /* منطقة عرض النتيجة التحميل */
        #result-area { max-width: 600px; margin: 20px auto; text-align: center; display: none; }
        #result-image { max-width: 100%; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 15px; }
        .loader { display: none; color: #14539a; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">aklake</div>
    <div class="nav-links">
        <a href="#">المنتجات</a>
        <button id="login-nav-btn" onclick="openModal()"><i class="fas fa-user-circle"></i> تسجيل الدخول</button>
        <div id="user-info">
            <span id="user-name"></span>
            <div class="credits"><i class="fas fa-coins"></i> <span id="user-credits">0</span></div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>
</nav>

<section class="search-section">
    <h2>ماذا تريد أن ترسم اليوم؟</h2>
    <div class="input-wrapper">
        <input type="text" id="search-input" class="search-box" placeholder="صف الصورة التي تتخيلها (يفضل بالإنجليزية)..." oninput="checkInput()">
        <button id="send-btn" onclick="processRequest()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div class="quick-actions">
        <button class="action-btn" onclick="fillInput('A minimalist slice of life anime character, thin lineart')">شخصية أنمي، خطوط رفيعة</button>
        <button class="action-btn" onclick="fillInput('A beautiful Moroccan traditional living room, highly detailed, photorealistic')">صالون مغربي تقليدي</button>
        <button class="action-btn" onclick="fillInput('Futuristic city skyline at sunset, cyberpunk style')">مدينة مستقبلية (سايبربانك)</button>
    </div>

    <div class="loader" id="loader"><i class="fas fa-spinner fa-spin"></i> جاري توليد الصورة وخصم 5 نقاط...</div>
    <div id="result-area">
        <img id="result-image" src="" alt="النتيجة">
    </div>
</section>

<div class="modal" id="auth-modal">
    <div class="modal-content">
        <h3 id="modal-title">تسجيل الدخول</h3>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <input type="text" id="name" placeholder="الاسم (لإنشاء حساب جديد فقط)" style="display: none;">
        
        <button class="primary-btn" id="auth-submit-btn" onclick="handleAuth()">دخول</button>
        
        <p style="font-size: 0.9em; color: #555; margin-top: 15px;">
            <a href="#" onclick="toggleAuthMode()" id="toggle-auth-text">ليس لديك حساب؟ إنشاء حساب جديد</a>
        </p>
        <button class="close-btn" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<script>
    // 1. تهيئة Appwrite (المفاتيح هنا آمنة تماماً)
    const { Client, Account, Databases, Functions, Query, ID } = Appwrite;
    const client = new Client()
        .setEndpoint('https://fra.cloud.appwrite.io/v1') 
        .setProject('6a36cda70021ceb1f3d0'); 
    
    const account = new Account(client);
    const databases = new Databases(client);
    const appwriteFunctions = new Functions(client); // لربط الواجهة بالوظيفة

    // متغيرات أساسية يجب تعبئتها
    const DB_ID = '6a3706880011ad5651b5'; // أيدي قاعدة البيانات الخاص بك
    const COLLECTION_ID = 'cvs_chat_cv_mab'; // أيدي الجدول الخاص بك
    const FUNCTION_ID = 'ضع_أيدي_الوظيفة_هنا'; // ⚠️ ضع معرف الدالة (Function ID) من لوحة Appwrite هنا

    let isLoginMode = true;
    let currentUser = null;

    // --- دوال الواجهة (UI) ---
    const input = document.getElementById('search-input');
    const sendBtn = document.getElementById('send-btn');

    function fillInput(text) { input.value = text; checkInput(); }
    function checkInput() { sendBtn.style.display = input.value.trim().length > 0 ? 'flex' : 'none'; }

    // --- دوال المصادقة (Authentication) ---
    function openModal() { document.getElementById('auth-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('auth-modal').style.display = 'none'; }
    
    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('modal-title').innerText = isLoginMode ? 'تسجيل الدخول' : 'إنشاء حساب جديد';
        document.getElementById('auth-submit-btn').innerText = isLoginMode ? 'دخول' : 'إنشاء حساب';
        document.getElementById('name').style.display = isLoginMode ? 'none' : 'block';
        document.getElementById('toggle-auth-text').innerText = isLoginMode ? 'ليس لديك حساب؟ إنشاء حساب جديد' : 'لديك حساب بالفعل؟ تسجيل الدخول';
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const name = document.getElementById('name').value;

        try {
            if (!isLoginMode) {
                // إنشاء حساب
                const newAccount = await account.create(ID.unique(), email, password, name);
                
                // إنشاء سجل نقاط للمستخدم الجديد (يمنحه 70 نقطة كما طلبت)
                await databases.createDocument(DB_ID, COLLECTION_ID, ID.unique(), {
                    userId: newAccount.$id,
                    tokens: 70
                });
            }
            
            // تسجيل الدخول
            await account.createEmailPasswordSession(email, password);
            closeModal();
            checkSession();
        } catch (error) {
            alert("خطأ في المصادقة: " + error.message);
        }
    }

    async function checkSession() {
        try {
            currentUser = await account.get();
            document.getElementById('login-nav-btn').style.display = 'none';
            document.getElementById('user-info').style.display = 'flex';
            document.getElementById('user-name').innerText = currentUser.name || "مستخدم";
            
            fetchUserCredits();
        } catch (error) {
            document.getElementById('login-nav-btn').style.display = 'block';
            document.getElementById('user-info').style.display = 'none';
            currentUser = null;
        }
    }

    async function logout() {
        await account.deleteSession('current');
        location.reload();
    }

    // --- جلب النقاط من قاعدة البيانات الحقيقية ---
    async function fetchUserCredits() {
        try {
            const response = await databases.listDocuments(DB_ID, COLLECTION_ID, [
                Query.equal('userId', currentUser.$id)
            ]);

            if (response.documents.length > 0) {
                document.getElementById('user-credits').innerText = response.documents[0].tokens;
            } else {
                document.getElementById('user-credits').innerText = "0";
            }
        } catch (error) {
            console.error("خطأ في جلب النقاط:", error);
        }
    }

    // --- إرسال الطلب للوظيفة (توليد الصورة وخصم النقاط) ---
    async function processRequest() {
        if (!currentUser) {
            alert("يرجى تسجيل الدخول أولاً لتتمكن من استخدام الخدمة.");
            openModal();
            return;
        }

        const prompt = input.value;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';

        try {
            // تحضير البيانات للإرسال إلى الدالة
            const payload = JSON.stringify({
                userId: currentUser.$id,
                prompt: prompt
            });

            // استدعاء دالة Appwrite
            const execution = await appwriteFunctions.createExecution(
                FUNCTION_ID, 
                payload, 
                false, // false = ننتظر النتيجة (Synchronous)
                '/', 
                'POST', 
                { 'Content-Type': 'application/json' }
            );

            // تحليل رد الخادم
            const responseData = JSON.parse(execution.responseBody);

            if (responseData.success) {
                // عرض الصورة وتحديث الرصيد مباشرة من استجابة الخادم
                document.getElementById('result-image').src = responseData.image;
                document.getElementById('user-credits').innerText = responseData.remainingTokens;
                document.getElementById('result-area').style.display = 'block';
            } else {
                alert("فشل التوليد: " + responseData.error);
            }
        } catch (error) {
            console.error(error);
            alert("حدث خطأ أثناء الاتصال بالخادم.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    window.onload = checkSession;
</script>

</body>
</html>
